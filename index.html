<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RITENTA! - Micro App</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

  :root {
    --bg-main: #090a0d;
    --bg-panel: #12151b;
    --bg-panel-alt: #171b23;
    --text-main: #e6eaee;
    --text-muted: #6c7684;
    --border: #232833;

    --primary: #4da3ff;
    --primary-hover: #7cbeff;

    --success: #2ad9c4;
    --success-bg: rgba(42, 217, 196, 0.07);

    --danger: #e60000;
    --danger-bg: rgba(230, 0, 0, 0.12);

    --warning: #e0a13d;
    --warning-bg: rgba(224, 161, 61, 0.07);

    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .hidden { display: none !important; }

  body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  #app {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* HEADER */
  h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--danger);
    -webkit-text-stroke: 1.5px var(--border);
    text-transform: uppercase;
    text-align: center;
    margin-top: 10px;
    animation: neonGlitch 3s infinite alternate;
  }

  @keyframes neonGlitch {
    0%, 18%, 22%, 25%, 53%, 57%, 100% {
      text-shadow: 0 0 5px var(--danger), 0 0 10px var(--danger), 0 0 20px var(--danger);
      opacity: 1;
      transform: skewX(0deg);
    }
    20%, 24%, 55% {
      text-shadow: none;
      opacity: 0.8;
      transform: skewX(-3deg);
    }
  }

  .panel {
    background: var(--bg-panel);
    padding: 20px;
    border: 1px solid var(--border);
    border-top: 2px solid var(--primary);
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .panel-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    text-align: center;
  }
  .panel-title::before { content: "// "; color: var(--primary); }

  .res-box {
    background: var(--bg-panel-alt);
    border: 1px solid var(--border);
    padding: 12px;
    text-align: center;
    border-left: 3px solid var(--danger);
  }
  .res-val { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700; color: var(--danger); }
  .res-lbl { font-size: 0.7rem; font-weight: 600; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 14px;
    border: 1px solid transparent;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-display);
    text-align: center;
  }
  .btn-primary { background: var(--primary); color: #04101c; }
  .btn-primary:active { transform: scale(0.98); }
  
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
  .btn-outline:active { border-color: var(--primary); color: var(--primary); transform: scale(0.98); }
  
  .btn-special { background: var(--warning-bg); border: 1px solid var(--warning); color: var(--warning); }
  .btn-special:active { background: var(--warning); color: #241400; transform: scale(0.98); }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* PROFESSOR EXAM AREA */
  .exam-box {
    text-align: left;
  }
  
  .exam-header {
    background: var(--warning-bg);
    border: 1px solid var(--warning);
    padding: 12px;
    margin-bottom: 20px;
  }
  
  #profDiffLabel { font-size: 0.8rem; font-weight: bold; color: var(--warning); margin-bottom: 4px;}
  #profStatusText { font-size: 0.9rem; color: var(--text-main); line-height: 1.4; transition: all 0.3s ease; }

  textarea {
    width: 100%;
    padding: 12px;
    background: var(--bg-panel-alt);
    border: 1px solid var(--border);
    color: var(--text-main);
    font-family: var(--font-display);
    font-size: 0.95rem;
    resize: vertical;
    min-height: 120px;
    margin-bottom: 16px;
    outline: none;
  }
  textarea:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(77, 163, 255, 0.2); }
  
  input[type="password"], input[type="text"] {
    width: 100%; padding: 12px; background: var(--bg-main); color: var(--text-main); border: 1px solid var(--border); margin-bottom: 12px; font-family: var(--font-mono); font-size: 0.85rem; outline: none;
  }
  input:focus { border-color: var(--primary); }

  .input-group { margin-bottom: 12px; }
  .input-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; display: block; }

  .flex-row { display: flex; gap: 10px; }
  .flex-1 { flex: 1; }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.1); }
  }

  .loader { font-size: 2.5rem; animation: statusPulse 1.5s infinite; margin-bottom: 16px; text-align: center;}
</style>
</head>
<body>

<div id="app">
  <h1>RITENTA!</h1>
  
  <!-- MENU PRINCIPALE -->
  <div id="menuView" class="panel">
    <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
      <button class="btn btn-special" id="btnRerollTF">🎓 VERO O FALSO</button>
      <button class="btn btn-special" id="btnRerollOpen">🎓 RISPOSTA APERTA</button>
    </div>
  </div>

  <!-- AREA ESAME / API -->
  <div id="examView" class="panel hidden">
    <div class="panel-title">Commissione Esame</div>
    
    <div class="exam-header">
      <div id="profDiffLabel">IN ATTESA...</div>
      <div id="profStatusText">Configura le chiavi API o attendi il caricamento.</div>
    </div>

    <!-- CONFIGURAZIONE API -->
    <div id="profApiKeyArea" class="hidden">
      <div class="input-group">
        <label class="input-label">1. Chiave OpenRouter (sk-or-v1-...):</label>
        <input type="password" id="apiKeyInput" placeholder="Opzionale">
      </div>
      <div class="input-group">
        <label class="input-label">2. Chiave Groq (gsk_...):</label>
        <input type="password" id="groqApiKeyInput" placeholder="Opzionale">
      </div>
      <div class="input-group">
        <label class="input-label">3. Chiave Google AI Studio (AIzaSy...):</label>
        <input type="password" id="googleApiKeyInput" placeholder="Opzionale">
      </div>
      
      <div class="flex-row" style="margin-top: 20px;">
        <button class="btn btn-primary flex-1" id="btnSaveApiKey">Salva & Continua</button>
        <button class="btn btn-outline flex-1" id="btnCancelApiKey">Annulla</button>
      </div>
    </div>

    <!-- CARICAMENTO -->
    <div id="profLoadingArea" class="hidden" style="text-align: center; padding: 20px 0;">
      <div class="loader">⏳</div>
      <button class="btn btn-outline" id="btnCancelLoading">❌ Annulla Tentativo</button>
    </div>

    <!-- ERRORE -->
    <div id="profErrorArea" class="hidden" style="display: flex; flex-direction: column; gap: 12px;">
      <button class="btn btn-special" id="btnRetryApi">🔄 Ritenta generazione</button>
      <button class="btn btn-primary" id="btnEditKeys">🔑 Modifica Chiavi API</button>
      <button class="btn btn-outline" id="btnCancelApi">❌ Esci</button>
    </div>

    <!-- DOMANDA -->
    <div id="profQuestionArea" class="hidden" style="margin-bottom: 20px;">
      <p id="profQuestionText" style="font-size: 1.05rem; font-weight: 600; color: var(--text-main); line-height: 1.5; padding: 10px; border-left: 3px solid var(--primary); background: var(--bg-panel-alt);"></p>
    </div>

    <!-- INPUT RISPOSTA APERTA -->
    <div id="profInputArea" class="hidden">
      <textarea id="profAnswerInput" placeholder="Scrivi la tua argomentazione logica qui..."></textarea>
      <div class="flex-row">
        <button class="btn btn-primary" style="flex: 2;" id="btnSubmitAnswer">Invia Risposta</button>
        <button class="btn btn-outline flex-1" id="btnCancelQuestion">❌ Esci</button>
      </div>
    </div>

    <!-- INPUT VERO/FALSO -->
    <div id="profTFInputArea" class="hidden">
      <div class="flex-row">
        <button class="btn btn-primary flex-1" id="btnAnswerTrue" style="background-color: var(--success); color: #000; border-color: var(--success);">VERO</button>
        <button class="btn btn-primary flex-1" id="btnAnswerFalse" style="background-color: var(--danger); color: #fff; border-color: var(--danger);">FALSO</button>
      </div>
      <button class="btn btn-outline" id="btnCancelQuestionTF" style="margin-top: 12px;">❌ Esci</button>
    </div>

    <!-- VALUTAZIONE -->
    <div id="profEvaluationArea" class="hidden">
      <div style="background: var(--bg-panel-alt); border: 1px solid var(--border); padding: 16px; margin-bottom: 20px;">
        <p id="profEvalResult" style="font-weight: 800; font-size: 1.2rem; margin-bottom: 10px; text-transform: uppercase;"></p>
        <p id="profEvalExplanation" style="font-size: 0.95rem; color: var(--text-muted); line-height: 1.5;"></p>
      </div>
      <button class="btn btn-primary" id="btnCloseProfModal">Torna al Menu</button>
    </div>
  </div>

</div>

<script>
(function(){
"use strict";

/* --- SISTEMA AUDIO --- */
const audioBg = new Audio('SUONIX/DystopianX.mp3');
audioBg.loop = true;
audioBg.volume = 0.4;

const sfxChoice = new Audio('SUONIX/VIAACCADEMICA.mp3');
const sfxCorrect = new Audio('SUONIX/RISPOSTACORRETTA.mp3');
const sfxWrong = new Audio('SUONIX/RISPOSTAERRATA.mp3');

function initAudioContext() {
  if (audioBg.paused) {
    audioBg.play().catch(e => { /* Autoplay bloccato ignorato */ });
  }
}
// Avvia la musica di background al primo click dell'utente (policy del browser)
document.addEventListener('click', initAudioContext, { once: true });

function playSfx(type) {
  let sfx;
  if (type === 'choice') sfx = sfxChoice;
  else if (type === 'correct') sfx = sfxCorrect;
  else if (type === 'wrong') sfx = sfxWrong;
  
  if (sfx) {
    sfx.currentTime = 0;
    sfx.play().catch(e => { /* Ignora se il browser blocca l'audio */ });
  }
}

/* --- STATO SIMULATO --- */
let gameState = {
  examMode: null,
  currentProfTruth: null,
  currentProfExplanation: "",
  currentProfQuestion: "",
  profOutcomeSuccess: false
};

const SECTORS = [
  {nome:"Intelligenza artificiale", domini:"Informatica, Data Science"},
  {nome:"Settore agroalimentare", domini:"Agraria, scienze della nutrizione"},
  {nome:"Biotecnologie", domini:"Biotecnologie mediche, medicina"},
  {nome:"Settore finanziario", domini:"Economia, finanza"},
  {nome:"Industria militare", domini:"Aeronautica, ingegneria meccanica"},
  {nome:"Energie rinnovabili", domini:"Scienze ambientali, Ingegneria"}
];

const LIVELLI_DIFFICOLTA = [
  "ELEMENTARE", "COMMON KNOWLEDGE", "GINNASIO", "DIPLOMA", 
  "UNIVERSITA' DELLA VITA", "STUDENTE FUORI CORSO", "LAUREATO"
];

/* --- RENDERING BASE --- */
const el = {
  menuView: document.getElementById('menuView'),
  examView: document.getElementById('examView'),
  btnRerollTF: document.getElementById('btnRerollTF'),
  btnRerollOpen: document.getElementById('btnRerollOpen')
};

function updateMenu() {
  // Menu updates (se necessario)
}

function showMenu() {
  el.examView.classList.add('hidden');
  el.menuView.classList.remove('hidden');
  updateMenu();
}

function showExam() {
  el.menuView.classList.add('hidden');
  el.examView.classList.remove('hidden');
}

/* --- LOGICA API LLM --- */
let currentAbortController = null;
let profPendingAction = null; 
let profPendingRetry = null;
let currentSector = null;

const EXAM_MODELS = [
  "google/gemma-2-9b-it:free",
  "meta-llama/llama-3.3-70b-instruct:free",
  "qwen/qwen-2.5-72b-instruct:free",
  "nvidia/llama-3.1-nemotron-70b-instruct:free",
  "openrouter/auto"
];

function getDifficultyLevel() {
  return LIVELLI_DIFFICOLTA[Math.floor(Math.random() * LIVELLI_DIFFICOLTA.length)];
}

function setProfSection(visibleId){
  ["profErrorArea","profQuestionArea","profInputArea","profTFInputArea","profEvaluationArea","profLoadingArea","profApiKeyArea"].forEach(id=>{
    const node = document.getElementById(id);
    if(node) {
      if(id === visibleId) node.classList.remove('hidden');
      else node.classList.add('hidden');
    }
  });
}

function showKeyConfigUI(onComplete) {
  setProfSection('profApiKeyArea');
  document.getElementById('apiKeyInput').value = localStorage.getItem('openrouter_api_key') || "";
  document.getElementById('groqApiKeyInput').value = localStorage.getItem('groq_api_key') || "";
  document.getElementById('googleApiKeyInput').value = localStorage.getItem('google_api_key') || "";
  
  document.getElementById('btnSaveApiKey').onclick = () => {
    const orVal = document.getElementById('apiKeyInput').value.trim();
    const groqVal = document.getElementById('groqApiKeyInput').value.trim();
    const googleVal = document.getElementById('googleApiKeyInput').value.trim();
    
    if(orVal) localStorage.setItem('openrouter_api_key', orVal);
    else localStorage.removeItem('openrouter_api_key');
    if(groqVal) localStorage.setItem('groq_api_key', groqVal);
    else localStorage.removeItem('groq_api_key');
    if(googleVal) localStorage.setItem('google_api_key', googleVal);
    else localStorage.removeItem('google_api_key');
    
    if(orVal || groqVal || googleVal) {
      if(onComplete) onComplete({ openrouter: orVal || null, groq: groqVal || null, google: googleVal || null });
    } else {
      document.getElementById('profStatusText').textContent = "Errore: Inserisci almeno una chiave valida!";
    }
  };
  
  document.getElementById('btnCancelApiKey').onclick = () => {
    if(onComplete) onComplete(null);
  };
}

function getKeysAsync() {
  return new Promise((resolve) => {
    let orKey = localStorage.getItem('openrouter_api_key');
    let groqKey = localStorage.getItem('groq_api_key');
    let googleKey = localStorage.getItem('google_api_key');
    
    if(orKey || groqKey || googleKey) {
      resolve({ openrouter: orKey, groq: groqKey, google: googleKey });
      return;
    }
    
    document.getElementById('profStatusText').textContent = "Configura almeno un provider per l'Esame (OpenRouter, Groq o Google).";
    showKeyConfigUI((keys) => resolve(keys));
  });
}

function parseJsonSafely(text){
  if (!text) return null;
  let cleaned = text.replace(/<think>[\s\S]*?<\/think>/g, '');
  cleaned = cleaned.replace(/```json|```/g, "").trim();
  try { return JSON.parse(cleaned); } catch(e){ 
    const match = cleaned.match(/\{[\s\S]*\}/);
    if(match) { try { return JSON.parse(match[0]); } catch(e2) { return null; } }
    return null; 
  }
}

async function callOpenRouterModel(model, messages, apiKey, signal){
  const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
    body: JSON.stringify({ model, messages, temperature: 0.8 }), signal: signal
  });
  if(!response.ok) throw new Error("Errore API (" + response.status + ")");
  const data = await response.json();
  return data?.choices?.[0]?.message?.content || "";
}

async function callGroqModel(model, messages, apiKey, signal){
  const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
    body: JSON.stringify({ model, messages, temperature: 0.8 }), signal: signal
  });
  if(!response.ok) throw new Error("Errore API (" + response.status + ")");
  const data = await response.json();
  return data?.choices?.[0]?.message?.content || "";
}

async function callGoogleModel(model, messages, apiKey, signal){
  const response = await fetch("https://generativelanguage.googleapis.com/v1beta/openai/chat/completions", {
    method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
    body: JSON.stringify({ model, messages, temperature: 0.8 }), signal: signal
  });
  if(!response.ok) throw new Error("Errore API (" + response.status + ")");
  const data = await response.json();
  return data?.choices?.[0]?.message?.content || "";
}

async function callResilientLLM(messages, timeoutMs){
  const keys = await getKeysAsync();
  if(!keys) {
    const e = new Error("Operazione annullata."); e.isCancel = true; throw e;
  }
  
  let lastError = null;
  currentAbortController = new AbortController();
  
  if(keys.google) {
    try {
      return await callGoogleModel("gemini-3.5-flash", messages, keys.google, currentAbortController.signal);
    } catch(err) { lastError = err; }
  }
  
  if(keys.groq) {
    try {
      return await callGroqModel("groq/compound", messages, keys.groq, currentAbortController.signal);
    } catch(err) { lastError = err; }
  }
  
  if(keys.openrouter) {
    for(let i=0; i<EXAM_MODELS.length; i++){
      try {
        return await callOpenRouterModel(EXAM_MODELS[i], messages, keys.openrouter, currentAbortController.signal);
      } catch(err) { lastError = err; }
    }
  }
  
  if(lastError && lastError.name === 'AbortError') { const e = new Error("Annullato."); e.isCancel = true; throw e; }
  throw lastError || new Error("Nessun provider disponibile.");
}

function showProfError(message, retryFn){
  profPendingRetry = retryFn;
  document.getElementById('profDiffLabel').textContent = "ERRORE CONNESSIONE";
  document.getElementById('profStatusText').textContent = message;
  setProfSection('profErrorArea');
}

function cancelAndRefund() {
  showMenu();
}

async function requestExamQuestion(){
  currentSector = SECTORS[Math.floor(Math.random() * SECTORS.length)];
  const diffLevel = getDifficultyLevel();
  
  document.getElementById('profDiffLabel').textContent = "COMMISSIONE: " + currentSector.nome.toUpperCase();
  document.getElementById('profStatusText').textContent = "Formulazione quesito in corso...";
  
  profPendingAction = 'request';
  setProfSection('profLoadingArea');

  const isTF = (gameState.examMode === 'tf');
  let systemMsg = ""; let userMsg = "";

  if (isTF) {
    systemMsg = "Sei un assistente per un gioco. Genera un'affermazione (vera o falsa) in formato JSON.";
    userMsg = `Formula un'affermazione su: ${currentSector.domini}. Livello: '${diffLevel}'. Restituisci ESCLUSIVAMENTE JSON: {"affermazione": "...", "difficolta": "${diffLevel}", "is_true": true/false, "spiegazione": "..."}`;
  } else {
    systemMsg = "Sei un assistente per un gioco. Genera una domanda d'esame in formato JSON.";
    userMsg = `Formula una domanda su: ${currentSector.domini}. Livello: '${diffLevel}'. Max 60 parole. Restituisci ESCLUSIVAMENTE JSON: {"domanda": "...", "difficolta": "${diffLevel}"}`;
  }

  try{
    const raw = await callResilientLLM([{ role: "system", content: systemMsg }, { role: "user", content: userMsg }], 20000);
    const parsed = parseJsonSafely(raw);
    let domanda = "";
    
    if (isTF) {
        if (parsed) {
            domanda = parsed.affermazione || parsed.statement || "";
            const tr = parsed.is_true;
            gameState.currentProfTruth = (tr === true || tr === "true" || tr === "Vero" || tr === "vero");
            gameState.currentProfExplanation = parsed.spiegazione || "Nessuna spiegazione fornita.";
        }
        if (!domanda) throw new Error("Errore formato JSON.");
    } else {
        if (parsed) domanda = parsed.domanda || parsed.question || "";
        if (!domanda) throw new Error("Errore formato JSON.");
    }

    gameState.currentProfQuestion = domanda;
    document.getElementById('profQuestionText').innerHTML = "<span style='font-size:0.8rem; color:var(--primary);'>LIV: " + diffLevel + "</span><br><br>" + domanda;
    setProfSection('profQuestionArea');

    if (isTF) {
        document.getElementById('profStatusText').textContent = "Questa affermazione è VERA o FALSA?";
        document.getElementById('profTFInputArea').classList.remove('hidden');
    } else {
        document.getElementById('profStatusText').textContent = "Rispondi con un'argomentazione sintetica.";
        document.getElementById('profAnswerInput').value = "";
        document.getElementById('profInputArea').classList.remove('hidden');
    }
  } catch(err){
    if(err.isCancel) cancelAndRefund();
    else showProfError(err.message || "Errore di generazione.", requestExamQuestion);
  }
}

function submitExamAnswerTF(playerGuess) {
  const corretto = (playerGuess === gameState.currentProfTruth);
  gameState.profOutcomeSuccess = corretto;
  
  // Riproduce il suono corretto o errato
  if (corretto) playSfx('correct');
  else playSfx('wrong');
  
  document.getElementById('profEvalResult').textContent = corretto ? "✔ Risposta Esatta!" : "✘ Risposta Errata!";
  document.getElementById('profEvalResult').style.color = corretto ? "var(--success)" : "var(--danger)";
  document.getElementById('profEvalExplanation').textContent = gameState.currentProfExplanation;
  
  setProfSection('profEvaluationArea');
}

async function submitExamAnswer(){
  const answer = document.getElementById('profAnswerInput').value.trim();
  if(!answer) return;

  document.getElementById('profStatusText').textContent = "Valutazione in corso...";
  profPendingAction = 'submit';
  setProfSection('profLoadingArea');

  try{
    const raw = await callResilientLLM([
      { role: "system", content: "Valuta la risposta dello studente per un gioco. JSON: {\"corretto\": true/false, \"spiegazione\": \"...\"}" },
      { role: "user", content: `Domanda: ${gameState.currentProfQuestion}\nAmbito: ${currentSector.domini}\nRisposta: ${answer}` }
    ], 25000);

    const parsed = parseJsonSafely(raw);
    const corretto = parsed ? !!parsed.corretto : false;
    const spiegazione = (parsed && parsed.spiegazione) ? parsed.spiegazione : raw.trim();

    gameState.profOutcomeSuccess = corretto;
    
    // Riproduce il suono corretto o errato
    if (corretto) playSfx('correct');
    else playSfx('wrong');

    document.getElementById('profEvalResult').textContent = corretto ? "✔ Argomentazione accettata" : "✘ Argomentazione respinta";
    document.getElementById('profEvalResult').style.color = corretto ? "var(--success)" : "var(--danger)";
    document.getElementById('profEvalExplanation').textContent = spiegazione;

    setProfSection('profEvaluationArea');
  } catch(err){
    if(err.isCancel) {
      document.getElementById('profStatusText').textContent = "Rispondi con un'argomentazione sintetica.";
      setProfSection('profQuestionArea');
      document.getElementById('profInputArea').classList.remove('hidden');
    } else {
      showProfError(err.message || "Impossibile calcolare il verdetto.", submitExamAnswer);
    }
  }
}

/* --- EVENT LISTENERS --- */
el.btnRerollTF.addEventListener('click', () => {
  playSfx('choice');
  gameState.examMode = 'tf';
  showExam();
  requestExamQuestion();
});

el.btnRerollOpen.addEventListener('click', () => {
  playSfx('choice');
  gameState.examMode = 'open';
  showExam();
  requestExamQuestion();
});

document.getElementById('btnAnswerTrue').addEventListener('click', () => submitExamAnswerTF(true));
document.getElementById('btnAnswerFalse').addEventListener('click', () => submitExamAnswerTF(false));
document.getElementById('btnSubmitAnswer').addEventListener('click', submitExamAnswer);

document.getElementById('btnRetryApi').addEventListener('click', () => { if(profPendingRetry) profPendingRetry(); });
document.getElementById('btnEditKeys').addEventListener('click', () => {
  document.getElementById('profStatusText').textContent = "Modifica chiavi API.";
  showKeyConfigUI((keys) => { if(keys) { if(profPendingRetry) profPendingRetry(); } else setProfSection('profErrorArea'); });
});

document.getElementById('btnCloseProfModal').addEventListener('click', showMenu);
document.getElementById('btnCancelLoading').addEventListener('click', () => { if(currentAbortController) currentAbortController.abort(); });
document.getElementById('btnCancelApi').addEventListener('click', cancelAndRefund);
document.getElementById('btnCancelQuestion').addEventListener('click', cancelAndRefund);
document.getElementById('btnCancelQuestionTF').addEventListener('click', cancelAndRefund);

// Init
updateMenu();
})();
</script>
</body>
</html>
